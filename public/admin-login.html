<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alendent Admin — Login</title>
<link rel="icon" type="image/jpeg" href="/assets/alendent-logo.jpeg" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Manrope", system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e8ecf0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #1a1d27;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo-row img {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: cover;
  }

  .logo-row .brand {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }

  .logo-row .tag {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 13.5px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  input[type="password"] {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #fff;
    font: 15px "Manrope", system-ui, sans-serif;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  input[type="password"]:focus {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.09);
  }

  .error-msg {
    display: none;
    align-items: center;
    gap: 7px;
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    font-size: 13px;
    color: #f87171;
  }

  .error-msg.visible { display: flex; }

  .btn-submit {
    width: 100%;
    height: 44px;
    margin-top: 20px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 10px;
    font: 600 15px "Manrope", system-ui, sans-serif;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    letter-spacing: -0.01em;
  }

  .btn-submit:hover { background: #1d4ed8; }
  .btn-submit:active { background: #1e40af; }
  .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    transition: color 0.15s;
  }

  .back-link:hover { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <img src="/assets/alendent-logo.jpeg" alt="Alendent" />
    <div>
      <div class="brand">Alendent</div>
      <div class="tag">Admin Portal</div>
    </div>
  </div>

  <h1>Sign in</h1>
  <p class="subtitle">Enter your admin password to continue.</p>

  <form id="loginForm" novalidate>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" autofocus required />
    <div class="error-msg" id="errorMsg" role="alert">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="6.5" stroke="#f87171"/>
        <path d="M7 4v3.5M7 9.5h.01" stroke="#f87171" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span id="errorText">Incorrect password</span>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
  </form>

  <a href="/" class="back-link">← Back to site</a>
</div>

<script>
  const form      = document.getElementById("loginForm");
  const pwdInput  = document.getElementById("password");
  const errorMsg  = document.getElementById("errorMsg");
  const errorText = document.getElementById("errorText");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const password = pwdInput.value;
    if (!password) return;

    submitBtn.disabled = true;
    submitBtn.textContent = "Signing in…";
    errorMsg.classList.remove("visible");

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
        credentials: "same-origin",
      });

      if (res.ok) {
        window.location.href = "/admin";
      } else {
        const data = await res.json().catch(() => ({}));
        errorText.textContent = res.status === 429
          ? "Too many attempts. Try again in 15 minutes."
          : data.error || "Incorrect password";
        errorMsg.classList.add("visible");
        pwdInput.value = "";
        pwdInput.focus();
      }
    } catch {
      errorText.textContent = "Network error. Please try again.";
      errorMsg.classList.add("visible");
    }

    submitBtn.disabled = false;
    submitBtn.textContent = "Sign in";
  });
</script>
</body>
</html>
